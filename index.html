<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login - Pollosoft</title>
        <link rel="stylesheet" href="css/index.css" />
    </head>
    <body>
        <div class="container">
            <!-- LADO IZQUIERDO -->
            <div class="left">
                <img src="img/logo.png" alt="Logo Pollosoft" class="logo" />
                <h1 class="left-titulo">POLLOSOFT</h1>
                <h2 class="left-subtitulo">
                    Sistema de Gestion - Pollos Triple A
                </h2>
            </div>

            <!-- LADO DERECHO -->
            <div class="right">
                <div class="card">
                    <h2>PolloSoft</h2>
                    <span>Sistema de Gestión Avícola</span>

                    <form>
                        <input
                            class="input-correo"
                            type="email"
                            placeholder="Correo electrónico *"
                            required
                        />

                        <input
                            class="input-password"
                            type="password"
                            placeholder="Contraseña *"
                            required
                        />

                        <button class="button-inicio" type="submit">
                            Inicio de Sesión
                        </button>
                    </form>

                    <p class="login-text">
                        <a href="#">¿Olvidé mi contraseña?</a><br />
                        ¿No tienes cuenta?
                        <a href="registro.html">Regístrate</a>
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
