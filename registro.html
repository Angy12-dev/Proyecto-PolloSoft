<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registro - Pollosoft</title>
        <link rel="stylesheet" href="css/index.css" />
        <link rel="stylesheet" href="css/registro.css" />
    </head>

    <body>
        <div class="container">
            <!-- LADO IZQUIERDO -->
            <div class="left">
                <img src="img/logo.png" alt="Logo Pollosoft" class="logo" />
                <h1 class="left-titulo">POLLOSOFT</h1>
                <h2 class="left-subtitulo">
                    Sistema de Gestion - Pollos Triple A
                </h2>
            </div>

            <!-- LADO DERECHO -->
            <div class="right">
                <div class="card">
                    <h2>PolloSoft</h2>
                    <span>Sistema de Gestión Avícola</span>

                    <form>
                        <input
                            class="input-nombre"
                            type="text"
                            placeholder="Nombre Completo *"
                            required
                        />
                        <input
                            type="email"
                            placeholder="Correo electrónico *"
                            required
                        />
                        <select
                            class="select-rol"
                            name="lenguaje"
                            id="lenguaje"
                            required
                        >
                            <option value="">Rol *</option>
                            <option value="">Admin</option>
                            <option value="">Operario</option>
                            <option value="">Vendedor</option>
                        </select>
                        <input
                            class="input-password"
                            type="password"
                            placeholder="Contraseña *"
                            required
                        />

                        <button class="button-inicio" type="submit">
                            Registrarse
                        </button>
                    </form>

                    <p class="login-text">
                        ¿Ya tienes cuenta?
                        <a href="index.html">Inicia Sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
